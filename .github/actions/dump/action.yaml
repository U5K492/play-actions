name: Cump
description: |
  環境変数とgithubコンテキストをログへ出力しまう。
  ワークフローのデバックに便利です。
inputs:
  enable-context:
    default: 'true'
    required: false
    description: コンテキストをログに出力するか
outputs:
  dumed-date:
    value: ${{ steps.current.outputs.date }}
    description: ダンプ時間
runs:
  using: composite
  steps:
    - run: printenv | sort
      shell: bash
    - run: echo "${CONTEXT}"
      if: ${{ inputs.enable-context == 'true' }}
      env:
        CONTEXT: ${{ toJSON(github) }}
      shell: bash
    - id: current
      run: echo "date=$(date)" >> "${GITHUB_OUTPUT}"
      shell: bash
