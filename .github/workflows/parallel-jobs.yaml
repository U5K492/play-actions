name: Parallel jobs
on: push
jobs:
  first:
    runs-on: ubuntu-latest
    steps:
      - run: sleep 10 && echo 'First job'
  second:
    runs-on: ubuntu-latest
    steps:
      - run: sleep 10 && echo 'Secong job'
  third:
    runs-on: ubuntu-latest
    steps:
      - run: sleep 10 && echo 'Third job'
